<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvy - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 800px;
            width: 90%;
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            animation: scaleIn 0.6s ease-out 0.2s both;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        h1 {
            font-size: 48px;
            margin-bottom: 15px;
            color: #333;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .subtitle {
            font-size: 20px;
            color: #666;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .intro {
            font-size: 18px;
            line-height: 1.8;
            color: #555;
            margin-bottom: 40px;
            text-align: left;
            animation: fadeIn 0.8s ease-out 0.8s both;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            animation: fadeIn 0.8s ease-out 1s both;
        }

        .link-item {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .link-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .skills {
            margin-top: 50px;
            animation: fadeIn 0.8s ease-out 1.2s both;
        }

        .skills-title {
            font-size: 24px;
            margin-bottom: 25px;
            color: #333;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .skill-tag {
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 14px;
            color: #666;
            transition: all 0.3s ease;
        }

        .skill-tag:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 36px;
            }

            .avatar {
                width: 120px;
                height: 120px;
                font-size: 48px;
            }

            .subtitle {
                font-size: 18px;
            }

            .intro {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">J</div>
        <h1>Jarvy</h1>
        <p class="subtitle">欢迎来到我的个人主页</p>
        <div class="intro">
            <p>你好，我是 Jarvy。这里是我的个人空间，我会在这里分享我的想法、项目和技术心得。</p>
            <p>我热爱编程、设计和探索新技术。希望通过这个网站与你交流，一起成长。</p>
        </div>
        <div class="links">
            <a href="#projects" class="link-item">项目</a>
            <a href="#blog" class="link-item">博客</a>
            <a href="#contact" class="link-item">联系</a>
        </div>
        <div class="skills">
            <h2 class="skills-title">技能</h2>
            <div class="skills-grid">
                <span class="skill-tag">前端开发</span>
                <span class="skill-tag">UI/UX设计</span>
                <span class="skill-tag">JavaScript</span>
                <span class="skill-tag">React</span>
                <span class="skill-tag">Vue</span>
                <span class="skill-tag">Node.js</span>
            </div>
        </div>
    </div>

    <script>
        // 添加平滑滚动效果
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });

        // 添加鼠标移动视差效果
        const container = document.querySelector('.container');
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            container.style.transform = `translate(${x * 10 - 5}px, ${y * 10 - 5}px)`;
        });
    </script>
</body>
</html>
